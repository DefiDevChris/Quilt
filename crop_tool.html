<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quilt Image Cropper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: #fff;
            min-height: 100vh;
        }
        
        .header {
            background: #2a2a2a;
            padding: 1rem 2rem;
            border-bottom: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .progress {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .progress span {
            font-size: 0.875rem;
            color: #aaa;
        }
        
        .progress .count {
            color: #ff8d49;
            font-weight: 600;
        }
        
        .main {
            display: flex;
            height: calc(100vh - 60px);
        }
        
        .sidebar {
            width: 280px;
            background: #2a2a2a;
            border-right: 1px solid #444;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #444;
            font-size: 0.875rem;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .image-list {
            list-style: none;
        }
        
        .image-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid #333;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .image-item:hover {
            background: #333;
        }
        
        .image-item.active {
            background: #ff8d49;
            color: #1a1a1a;
        }
        
        .image-item.cropped {
            border-left: 3px solid #4ade80;
        }
        
        .image-item .status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            flex-shrink: 0;
        }
        
        .image-item.cropped .status {
            background: #4ade80;
        }
        
        .image-item .name {
            font-size: 0.8rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .toolbar {
            padding: 0.75rem 1rem;
            background: #2a2a2a;
            border-bottom: 1px solid #444;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        
        .toolbar button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: background 0.15s;
        }
        
        .btn-primary {
            background: #ff8d49;
            color: #1a1a1a;
        }
        
        .btn-primary:hover {
            background: #e67d3f;
        }
        
        .btn-secondary {
            background: #444;
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: #555;
        }
        
        .btn-success {
            background: #4ade80;
            color: #1a1a1a;
        }
        
        .btn-success:hover {
            background: #22c55e;
        }
        
        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 1rem;
            position: relative;
        }
        
        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }
        
        #canvas {
            max-width: 100%;
            max-height: calc(100vh - 200px);
            cursor: crosshair;
            display: block;
        }
        
        .crop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .crop-selection {
            position: absolute;
            border: 2px solid #ff8d49;
            background: rgba(255, 141, 73, 0.1);
            pointer-events: auto;
            cursor: move;
            display: none;
        }
        
        .crop-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff8d49;
            border: 2px solid #fff;
            border-radius: 50%;
        }
        
        .crop-handle.nw { top: -5px; left: -5px; cursor: nw-resize; }
        .crop-handle.ne { top: -5px; right: -5px; cursor: ne-resize; }
        .crop-handle.sw { bottom: -5px; left: -5px; cursor: sw-resize; }
        .crop-handle.se { bottom: -5px; right: -5px; cursor: se-resize; }
        
        .crop-dim {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            pointer-events: none;
        }
        
        .info-panel {
            padding: 0.75rem 1rem;
            background: #2a2a2a;
            border-top: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #aaa;
        }
        
        .crop-dimensions {
            color: #ff8d49;
            font-weight: 600;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
        }
        
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .instructions {
            background: #333;
            padding: 1rem;
            margin: 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #aaa;
            line-height: 1.6;
        }
        
        .instructions strong {
            color: #ff8d49;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎨 Quilt Image Cropper</h1>
        <div class="progress">
            <span>Cropped:</span>
            <span class="count" id="croppedCount">0 / 0</span>
        </div>
    </div>
    
    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">Images</div>
            <ul class="image-list" id="imageList"></ul>
        </div>
        
        <div class="workspace">
            <div class="toolbar">
                <button class="btn-secondary" id="prevBtn" disabled>← Previous</button>
                <button class="btn-secondary" id="nextBtn" disabled>Next →</button>
                <div style="flex: 1;"></div>
                <button class="btn-secondary" id="resetBtn" disabled>Reset Crop</button>
                <button class="btn-success" id="saveBtn" disabled>💾 Save & Next</button>
                <button class="btn-primary" id="exportAllBtn">Export All Cropped</button>
            </div>
            
            <div class="canvas-container">
                <div class="empty-state" id="emptyState">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p>Select an image from the list to start cropping</p>
                </div>
                
                <div class="canvas-wrapper" id="canvasWrapper" style="display: none;">
                    <canvas id="canvas"></canvas>
                    <div class="crop-overlay" id="cropOverlay">
                        <div class="crop-selection" id="cropSelection">
                            <div class="crop-handle nw" data-handle="nw"></div>
                            <div class="crop-handle ne" data-handle="ne"></div>
                            <div class="crop-handle sw" data-handle="sw"></div>
                            <div class="crop-handle se" data-handle="se"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="info-panel">
                <span id="imageInfo">No image selected</span>
                <span class="crop-dimensions" id="cropDimensions"></span>
            </div>
        </div>
    </div>
    
    <script>
        // State
        let images = [];
        let currentIndex = -1;
        let croppedImages = new Set();
        let cropData = {};
        
        // Canvas and crop state
        let canvas, ctx;
        let isDrawing = false;
        let isDragging = false;
        let isResizing = false;
        let resizeHandle = null;
        let startX, startY;
        let cropRect = null;
        let currentImage = null;
        let scale = 1;
        
        // DOM elements
        const imageList = document.getElementById('imageList');
        const canvasWrapper = document.getElementById('canvasWrapper');
        const emptyState = document.getElementById('emptyState');
        const cropOverlay = document.getElementById('cropOverlay');
        const cropSelection = document.getElementById('cropSelection');
        const canvasEl = document.getElementById('canvas');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const resetBtn = document.getElementById('resetBtn');
        const saveBtn = document.getElementById('saveBtn');
        const exportAllBtn = document.getElementById('exportAllBtn');
        const imageInfo = document.getElementById('imageInfo');
        const cropDimensions = document.getElementById('cropDimensions');
        const croppedCount = document.getElementById('croppedCount');
        
        // Initialize
        async function init() {
            // Get list of images from server
            try {
                const response = await fetch('/api/images');
                images = await response.json();
            } catch (e) {
                // Fallback: use hardcoded list
                images = await fetch('/images-list.json').then(r => r.json());
            }
            
            renderImageList();
            updateProgress();
        }
        
        function renderImageList() {
            imageList.innerHTML = '';
            images.forEach((img, index) => {
                const li = document.createElement('li');
                li.className = 'image-item' + (croppedImages.has(index) ? ' cropped' : '');
                li.innerHTML = `
                    <span class="status"></span>
                    <span class="name">${img.name}</span>
                `;
                li.addEventListener('click', () => selectImage(index));
                imageList.appendChild(li);
            });
        }
        
        function selectImage(index) {
            currentIndex = index;
            currentImage = images[index];
            
            // Update list selection
            document.querySelectorAll('.image-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
            
            // Show canvas
            emptyState.style.display = 'none';
            canvasWrapper.style.display = 'inline-block';
            
            // Load and display image
            const img = new Image();
            img.onload = () => {
                canvas = canvasEl;
                ctx = canvas.getContext('2d');
                
                // Calculate scale to fit in viewport
                const maxWidth = canvasWrapper.parentElement.clientWidth - 40;
                const maxHeight = canvasWrapper.parentElement.clientHeight - 40;
                scale = Math.min(maxWidth / img.width, maxHeight / img.height, 1);
                
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // Update info
                imageInfo.textContent = `${currentImage.name} (${img.width}×${img.height})`;
                
                // Restore crop if exists
                if (cropData[index]) {
                    cropRect = { ...cropData[index] };
                    updateCropOverlay();
                    saveBtn.disabled = false;
                } else {
                    cropRect = null;
                    cropSelection.style.display = 'none';
                    saveBtn.disabled = true;
                    cropDimensions.textContent = '';
                }
                
                // Enable buttons
                prevBtn.disabled = index === 0;
                nextBtn.disabled = index === images.length - 1;
                resetBtn.disabled = !cropRect;
            };
            img.src = currentImage.url;
        }
        
        // Crop drawing handlers
        cropOverlay.addEventListener('mousedown', startCrop);
        cropOverlay.addEventListener('mousemove', updateCrop);
        cropOverlay.addEventListener('mouseup', endCrop);
        cropOverlay.addEventListener('mouseleave', endCrop);
        
        // Touch support
        cropOverlay.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            startCrop({ clientX: touch.clientX, clientY: touch.clientY });
        });
        cropOverlay.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            updateCrop({ clientX: touch.clientX, clientY: touch.clientY });
        });
        cropOverlay.addEventListener('touchend', endCrop);
        
        // Handle resizing
        document.querySelectorAll('.crop-handle').forEach(handle => {
            handle.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                isResizing = true;
                resizeHandle = handle.dataset.handle;
                startX = e.clientX;
                startY = e.clientY;
            });
        });
        
        function startCrop(e) {
            if (isResizing) return;
            
            const rect = cropOverlay.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
            isDrawing = true;
            
            cropRect = { x: startX, y: startY, width: 0, height: 0 };
            cropSelection.style.display = 'block';
            updateCropOverlay();
        }
        
        function updateCrop(e) {
            const rect = cropOverlay.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (isResizing && cropRect) {
                // Handle resizing
                switch (resizeHandle) {
                    case 'nw':
                        cropRect.width += cropRect.x - x;
                        cropRect.height += cropRect.y - y;
                        cropRect.x = x;
                        cropRect.y = y;
                        break;
                    case 'ne':
                        cropRect.width = x - cropRect.x;
                        cropRect.height += cropRect.y - y;
                        cropRect.y = y;
                        break;
                    case 'sw':
                        cropRect.width += cropRect.x - x;
                        cropRect.x = x;
                        cropRect.height = y - cropRect.y;
                        break;
                    case 'se':
                        cropRect.width = x - cropRect.x;
                        cropRect.height = y - cropRect.y;
                        break;
                }
                normalizeCrop();
                updateCropOverlay();
            } else if (isDragging && cropRect) {
                // Handle dragging
                const dx = x - startX;
                const dy = y - startY;
                cropRect.x = Math.max(0, Math.min(cropRect.x + dx, rect.width - cropRect.width));
                cropRect.y = Math.max(0, Math.min(cropRect.y + dy, rect.height - cropRect.height));
                startX = x;
                startY = y;
                updateCropOverlay();
            } else if (isDrawing) {
                // Handle drawing
                cropRect.width = x - cropRect.x;
                cropRect.height = y - cropRect.y;
                normalizeCrop();
                updateCropOverlay();
            }
        }
        
        function endCrop() {
            if (isDrawing && cropRect && cropRect.width > 10 && cropRect.height > 10) {
                saveBtn.disabled = false;
                resetBtn.disabled = false;
            }
            isDrawing = false;
            isDragging = false;
            isResizing = false;
            resizeHandle = null;
        }
        
        function normalizeCrop() {
            if (cropRect.width < 0) {
                cropRect.x += cropRect.width;
                cropRect.width = -cropRect.width;
            }
            if (cropRect.height < 0) {
                cropRect.y += cropRect.height;
                cropRect.height = -cropRect.height;
            }
        }
        
        function updateCropOverlay() {
            if (!cropRect) return;
            
            cropSelection.style.left = cropRect.x + 'px';
            cropSelection.style.top = cropRect.y + 'px';
            cropSelection.style.width = cropRect.width + 'px';
            cropSelection.style.height = cropRect.height + 'px';
            
            // Update dimensions display (convert to actual image dimensions)
            const realWidth = Math.round(cropRect.width / scale);
            const realHeight = Math.round(cropRect.height / scale);
            cropDimensions.textContent = `Crop: ${realWidth}×${realHeight}`;
        }
        
        // Enable dragging on crop selection
        cropSelection.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('crop-handle')) return;
            e.preventDefault();
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
        });
        
        // Button handlers
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) selectImage(currentIndex - 1);
        });
        
        nextBtn.addEventListener('click', () => {
            if (currentIndex < images.length - 1) selectImage(currentIndex + 1);
        });
        
        resetBtn.addEventListener('click', () => {
            cropRect = null;
            cropSelection.style.display = 'none';
            saveBtn.disabled = true;
            resetBtn.disabled = true;
            cropDimensions.textContent = '';
            delete cropData[currentIndex];
            croppedImages.delete(currentIndex);
            updateProgress();
            renderImageList();
        });
        
        saveBtn.addEventListener('click', () => {
            if (!cropRect || currentIndex === -1) return;
            
            // Store crop data
            cropData[currentIndex] = { ...cropRect };
            croppedImages.add(currentIndex);
            
            // Update UI
            updateProgress();
            renderImageList();
            
            // Auto-advance to next image
            if (currentIndex < images.length - 1) {
                selectImage(currentIndex + 1);
            } else {
                saveBtn.disabled = true;
            }
        });
        
        exportAllBtn.addEventListener('click', exportAllCropped);
        
        function updateProgress() {
            croppedCount.textContent = `${croppedImages.size} / ${images.length}`;
        }
        
        async function exportAllCropped() {
            if (croppedImages.size === 0) {
                alert('No images have been cropped yet!');
                return;
            }
            
            exportAllBtn.textContent = 'Exporting...';
            exportAllBtn.disabled = true;
            
            for (const index of croppedImages) {
                const img = new Image();
                img.src = images[index].url;
                await new Promise(resolve => { img.onload = resolve; });
                
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                
                const crop = cropData[index];
                tempCanvas.width = crop.width / scale;
                tempCanvas.height = crop.height / scale;
                
                tempCtx.drawImage(
                    img,
                    crop.x / scale, crop.y / scale, crop.width / scale, crop.height / scale,
                    0, 0, tempCanvas.width, tempCanvas.height
                );
                
                // Download
                const link = document.createElement('a');
                link.download = `cropped_${images[index].name}`;
                link.href = tempCanvas.toDataURL('image/png');
                link.click();
                
                // Small delay to prevent browser throttling
                await new Promise(r => setTimeout(r, 100));
            }
            
            exportAllBtn.textContent = 'Export All Cropped';
            exportAllBtn.disabled = false;
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && !prevBtn.disabled) selectImage(currentIndex - 1);
            if (e.key === 'ArrowRight' && !nextBtn.disabled) selectImage(currentIndex + 1);
            if (e.key === 'Enter' && !saveBtn.disabled) saveBtn.click();
            if (e.key === 'Escape' && !resetBtn.disabled) resetBtn.click();
        });
        
        // Initialize app
        init();
    </script>
</body>
</html>
