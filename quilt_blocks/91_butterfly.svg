<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Left upper wing -->
  <polygon points="150,75 150,150 30,50" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Left upper wing accent -->
  <polygon points="150,90 150,140 60,70" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Left lower wing -->
  <polygon points="150,150 150,225 30,250" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Left lower wing accent -->
  <polygon points="150,160 150,215 55,235" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Right upper wing -->
  <polygon points="150,75 270,50 150,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Right upper wing accent -->
  <polygon points="150,90 240,70 150,140" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Right lower wing -->
  <polygon points="150,150 270,250 150,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Right lower wing accent -->
  <polygon points="150,160 245,235 150,215" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Body (central strip) -->
  <rect x="144" y="50" width="12" height="220" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Head -->
  <circle cx="150" cy="45" r="15" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Antennae -->
  <polygon points="147,30 120,10 125,15" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="153,30 180,10 175,15" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>