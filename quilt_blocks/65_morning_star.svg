<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Morning Star: 8-pointed star with center octagon, broken star points, accent triangles -->
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Corner squares -->
  <rect x="0" y="0" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="225" y="0" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="0" y="225" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="225" y="225" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- 8 main star points (D0D0D0) -->
  <!-- Top point -->
  <polygon points="150,0 187.5,75 150,75 112.5,75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Top-right point -->
  <polygon points="225,75 225,112.5 187.5,112.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,0 225,75 187.5,75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Right point -->
  <polygon points="300,150 225,187.5 225,150 225,112.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right point -->
  <polygon points="225,225 187.5,225 225,187.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,300 225,225 225,187.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom point -->
  <polygon points="150,300 112.5,225 150,225 187.5,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left point -->
  <polygon points="75,225 112.5,225 75,187.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,300 75,225 75,187.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Left point -->
  <polygon points="0,150 75,112.5 75,150 75,187.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Top-left point -->
  <polygon points="75,75 112.5,75 75,112.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,0 75,75 75,112.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Accent triangles between points (B0B0B0) -->
  <polygon points="187.5,75 225,75 225,112.5" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="225,187.5 225,225 187.5,225" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="112.5,225 75,225 75,187.5" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="75,112.5 75,75 112.5,75" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Center octagon (505050) -->
  <polygon points="112.5,75 187.5,75 225,112.5 225,187.5 187.5,225 112.5,225 75,187.5 75,112.5" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>