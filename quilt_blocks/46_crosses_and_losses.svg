<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Crosses and Losses: 3x3 grid (100px cells) -->
  <!-- Cross: center column and center row in dark -->
  <!-- Top center -->
  <rect x="100" y="0" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Middle left -->
  <rect x="0" y="100" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Center -->
  <rect x="100" y="100" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Middle right -->
  <rect x="200" y="100" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom center -->
  <rect x="100" y="200" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- 4 corner HSTs with dark halves pointing toward center -->
  <!-- Top-left: dark lower-right triangle -->
  <polygon points="0,0 100,0 0,100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="100,0 100,100 0,100" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Top-right: dark lower-left triangle -->
  <polygon points="200,0 300,0 300,100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="200,0 300,100 200,100" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left: dark upper-right triangle -->
  <polygon points="0,200 100,200 100,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,200 0,300 100,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right: dark upper-left triangle -->
  <polygon points="200,200 300,200 200,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,200 300,300 200,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
</svg>