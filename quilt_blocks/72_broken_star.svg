<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Broken Star: expanded LeMoyne star with broken/segmented diamond points -->
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Inner star diamonds (505050) — 8 inner diamond segments -->
  <!-- Top inner -->
  <polygon points="150,75 175,112.5 150,150 125,112.5" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Top-right inner -->
  <polygon points="187.5,87.5 212.5,112.5 150,150 175,112.5" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Right inner -->
  <polygon points="225,150 187.5,175 150,150 187.5,125" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right inner -->
  <polygon points="212.5,187.5 187.5,212.5 150,150 187.5,175" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom inner -->
  <polygon points="150,225 125,187.5 150,150 175,187.5" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left inner -->
  <polygon points="112.5,212.5 87.5,187.5 150,150 125,187.5" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Left inner -->
  <polygon points="75,150 112.5,125 150,150 112.5,175" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Top-left inner -->
  <polygon points="87.5,112.5 112.5,87.5 150,150 112.5,125" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Broken extension diamonds (D0D0D0) — outer segments -->
  <!-- Top extension -->
  <polygon points="150,0 175,37.5 150,75 125,37.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Top-right extension -->
  <polygon points="225,0 262.5,37.5 212.5,112.5 187.5,87.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Right-top extension -->
  <polygon points="300,75 262.5,112.5 187.5,87.5 225,75" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Right extension -->
  <polygon points="300,150 262.5,175 225,150 262.5,125" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Right-bottom extension -->
  <polygon points="300,225 262.5,187.5 212.5,187.5 225,225" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right extension -->
  <polygon points="225,300 187.5,262.5 187.5,212.5 262.5,262.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom extension -->
  <polygon points="150,300 125,262.5 150,225 175,262.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left extension -->
  <polygon points="75,300 37.5,262.5 112.5,212.5 112.5,262.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Left-bottom extension -->
  <polygon points="0,225 37.5,187.5 87.5,187.5 75,225" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Left extension -->
  <polygon points="0,150 37.5,125 75,150 37.5,175" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Left-top extension -->
  <polygon points="0,75 37.5,112.5 87.5,112.5 75,75" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Top-left extension -->
  <polygon points="75,0 112.5,37.5 112.5,87.5 37.5,37.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Connector segments between inner and outer -->
  <polygon points="175,37.5 187.5,87.5 175,112.5 150,75" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="262.5,112.5 212.5,112.5 187.5,125 225,150 262.5,125" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="262.5,187.5 212.5,187.5 187.5,175 225,150 262.5,175" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="187.5,262.5 187.5,212.5 175,187.5 150,225 175,262.5" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="112.5,262.5 112.5,212.5 125,187.5 150,225 125,262.5" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="37.5,187.5 87.5,187.5 112.5,175 75,150 37.5,175" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="37.5,112.5 87.5,112.5 112.5,125 75,150 37.5,125" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="112.5,37.5 112.5,87.5 125,112.5 150,75 125,37.5" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Corner fills -->
  <polygon points="0,0 75,0 37.5,37.5 0,75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,0 300,75 262.5,37.5 225,0" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,300 225,300 262.5,262.5 300,225" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="0,300 0,225 37.5,262.5 75,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Edge fills -->
  <polygon points="75,0 150,0 125,37.5 112.5,37.5" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 225,0 225,0 175,37.5" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,75 300,150 262.5,125" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,150 300,225 262.5,187.5" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="225,300 150,300 175,262.5" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="150,300 75,300 112.5,262.5 125,262.5" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="0,225 0,150 37.5,175" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 0,75 37.5,112.5" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
</svg>