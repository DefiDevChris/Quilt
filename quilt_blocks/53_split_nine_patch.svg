<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Split Nine Patch: 3x3 grid alternating solid squares and HSTs -->
  <!-- Solid squares at corners and center, HSTs at sides -->
  <!-- (0,0) solid dark -->
  <rect x="0" y="0" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- (1,0) HST -->
  <polygon points="100,0 200,0 100,100" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="200,0 200,100 100,100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- (2,0) solid light -->
  <rect x="200" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- (0,1) HST -->
  <polygon points="0,100 100,100 0,200" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="100,100 100,200 0,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- (1,1) solid dark -->
  <rect x="100" y="100" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- (2,1) HST -->
  <polygon points="200,100 300,100 300,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="200,100 200,200 300,200" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- (0,2) solid light -->
  <rect x="0" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- (1,2) HST -->
  <polygon points="100,200 200,200 200,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="100,200 100,300 200,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- (2,2) solid dark -->
  <rect x="200" y="200" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>