<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Chevron: V-shaped stripes stacking from bottom to top -->
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Chevron 1 (bottom, darkest) — 505050 -->
  <polygon points="0,300 150,240 300,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Chevron 2 — D0D0D0 -->
  <polygon points="0,240 150,180 300,240 150,240" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Fill sides of chevron 1 -->
  <polygon points="0,240 0,300 150,240" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="300,240 300,300 150,240" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Chevron 3 — 505050 -->
  <polygon points="0,180 150,120 300,180 150,180" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Fill sides of chevron 2 -->
  <polygon points="0,180 0,240 150,180" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,180 300,240 150,180" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Chevron 4 — D0D0D0 -->
  <polygon points="0,120 150,60 300,120 150,120" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Fill sides of chevron 3 -->
  <polygon points="0,120 0,180 150,120" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="300,120 300,180 150,120" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Chevron 5 (top) — 505050 -->
  <polygon points="0,60 150,0 300,60 150,60" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Fill sides of chevron 4 -->
  <polygon points="0,60 0,120 150,60" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,60 300,120 150,60" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Fill sides of chevron 5 (top background) -->
  <polygon points="0,0 0,60 150,0" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,0 300,60 150,0" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
</svg>