<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Tumbling Blocks: 3D cube illusion from 60° rhombi -->
  <!-- Each cube = hexagon divided into 3 rhombi (top/left/right faces) -->
  <!-- s=50, hex width≈86.6, hex height=100 -->
  <!-- Top face=light, Left face=medium, Right face=dark -->

  <!-- Row 0: centers at y=50, x=43.3, 129.9, 216.5 -->
  <!-- Cube (43.3, 50) -->
  <polygon points="43.3,0 86.6,25 43.3,50 0,25" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="0,25 43.3,50 43.3,100 0,75" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="43.3,50 86.6,25 86.6,75 43.3,100" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Cube (129.9, 50) -->
  <polygon points="129.9,0 173.2,25 129.9,50 86.6,25" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="86.6,25 129.9,50 129.9,100 86.6,75" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="129.9,50 173.2,25 173.2,75 129.9,100" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Cube (216.5, 50) -->
  <polygon points="216.5,0 259.8,25 216.5,50 173.2,25" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="173.2,25 216.5,50 216.5,100 173.2,75" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="216.5,50 259.8,25 259.8,75 216.5,100" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>

  <!-- Row 1: centers at y=125, x=86.6, 173.2, 259.8 (offset) -->
  <!-- Cube (86.6, 125) -->
  <polygon points="86.6,75 129.9,100 86.6,125 43.3,100" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="43.3,100 86.6,125 86.6,175 43.3,150" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="86.6,125 129.9,100 129.9,150 86.6,175" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Cube (173.2, 125) -->
  <polygon points="173.2,75 216.5,100 173.2,125 129.9,100" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="129.9,100 173.2,125 173.2,175 129.9,150" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="173.2,125 216.5,100 216.5,150 173.2,175" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Cube (259.8, 125) -->
  <polygon points="259.8,75 303.1,100 259.8,125 216.5,100" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="216.5,100 259.8,125 259.8,175 216.5,150" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="259.8,125 303.1,100 303.1,150 259.8,175" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>

  <!-- Row 2: centers at y=200, x=43.3, 129.9, 216.5 -->
  <!-- Cube (43.3, 200) -->
  <polygon points="43.3,150 86.6,175 43.3,200 0,175" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="0,175 43.3,200 43.3,250 0,225" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="43.3,200 86.6,175 86.6,225 43.3,250" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Cube (129.9, 200) -->
  <polygon points="129.9,150 173.2,175 129.9,200 86.6,175" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="86.6,175 129.9,200 129.9,250 86.6,225" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="129.9,200 173.2,175 173.2,225 129.9,250" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Cube (216.5, 200) -->
  <polygon points="216.5,150 259.8,175 216.5,200 173.2,175" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="173.2,175 216.5,200 216.5,250 173.2,225" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="216.5,200 259.8,175 259.8,225 216.5,250" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>

  <!-- Row 3: centers at y=275, x=86.6, 173.2, 259.8 -->
  <!-- Cube (86.6, 275) -->
  <polygon points="86.6,225 129.9,250 86.6,275 43.3,250" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="43.3,250 86.6,275 86.6,325 43.3,300" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="86.6,275 129.9,250 129.9,300 86.6,325" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Cube (173.2, 275) -->
  <polygon points="173.2,225 216.5,250 173.2,275 129.9,250" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="129.9,250 173.2,275 173.2,325 129.9,300" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="173.2,275 216.5,250 216.5,300 173.2,325" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Cube (259.8, 275) -->
  <polygon points="259.8,225 303.1,250 259.8,275 216.5,250" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="216.5,250 259.8,275 259.8,325 216.5,300" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="259.8,275 303.1,250 303.1,300 259.8,325" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
</svg>
