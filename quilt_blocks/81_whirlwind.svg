<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Whirlwind: 4x4 grid (75px cells), strong spinning/rotation with triangles -->
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Top-left quadrant: spin creates diagonal division -->
  <!-- Large dark triangle sweeping clockwise -->
  <polygon points="0,0 150,0 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Secondary triangle creating whirl -->
  <polygon points="0,0 75,0 0,75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Background fill -->
  <polygon points="0,0 0,150 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Whirl accent -->
  <polygon points="0,75 0,150 75,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Top-right quadrant -->
  <polygon points="150,0 300,0 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,0 300,75 225,0" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,0 300,150 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="300,75 300,150 225,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right quadrant -->
  <polygon points="300,150 300,300 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,300 225,300 300,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="150,150 150,300 300,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="225,300 150,300 150,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left quadrant -->
  <polygon points="150,150 0,300 150,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="0,300 0,225 75,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 0,300 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 75,150 0,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
</svg>