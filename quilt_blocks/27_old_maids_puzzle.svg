<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Old Maid's Puzzle: 2x2 grid (150px cells) creating S/Z shape -->
  <!-- Top-left: dark upper-right triangle (dark on the right) -->
  <polygon points="0,0 150,0 0,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 150,150 0,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Top-right: dark lower-right triangle -->
  <polygon points="150,0 300,0 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,0 300,150 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left: dark upper-left triangle -->
  <polygon points="0,150 150,150 0,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,150 150,300 0,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right: dark lower-left triangle -->
  <polygon points="150,150 300,150 300,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="150,150 150,300 300,300" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>