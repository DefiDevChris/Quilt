<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Yankee Puzzle: 4 HSTs in 2x2, dark triangles alternate creating spinning effect -->
  <!-- Top-left: diagonal from top-left to bottom-right, dark on top -->
  <polygon points="0,0 150,0 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="0,0 150,150 0,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Top-right: diagonal from top-right to bottom-left, dark on right -->
  <polygon points="150,0 300,0 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,0 300,150 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left: diagonal from top-right to bottom-left, dark on left -->
  <polygon points="0,150 150,150 0,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,150 150,300 0,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right: diagonal from top-left to bottom-right, dark on bottom -->
  <polygon points="150,150 300,150 300,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="150,150 300,300 150,300" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>
