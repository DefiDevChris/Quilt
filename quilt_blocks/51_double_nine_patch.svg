  <rect x="33.33" y="66.67" width="33.33" height="33.33" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <rect x="66.67" y="66.67" width="33.33" height="33.33" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Mini nine-patch at (2,0): top-right -->
