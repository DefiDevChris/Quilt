<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Economy Block: Square-in-a-square, center diamond with layered corner triangles -->
  <!-- Outer background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Outer corner triangles (second layer) -->
  <polygon points="0,0 150,0 0,150" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 300,0 300,150" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="300,150 300,300 150,300" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 150,300 0,300" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Inner layer triangles (D0D0D0) -->
  <polygon points="150,0 225,75 75,75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,150 225,75 225,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="150,300 225,225 75,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 75,75 75,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Center diamond (dark) -->
  <polygon points="150,75 225,150 150,225 75,150" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>
