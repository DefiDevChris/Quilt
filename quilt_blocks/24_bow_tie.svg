<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Bow Tie: 3x3 grid, two diagonal squares with connecting center knot -->
  <!-- Background fills for corner cells -->
  <!-- Top-left: dark square -->
  <rect x="0" y="0" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Top-center: background -->
  <rect x="100" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Top-right: background -->
  <rect x="200" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Middle-left: background -->
  <rect x="0" y="100" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Center: background base -->
  <rect x="100" y="100" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Middle-right: background -->
  <rect x="200" y="100" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left: background -->
  <rect x="0" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom-center: background -->
  <rect x="100" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right: dark square -->
  <rect x="200" y="200" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Center knot triangles connecting the two bow-tie halves -->
  <!-- Triangle pointing from top-left toward center -->
  <polygon points="100,100 150,150 100,200" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Triangle pointing from bottom-right toward center -->
  <polygon points="200,100 200,200 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>
