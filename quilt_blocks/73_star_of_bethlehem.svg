<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Star of Bethlehem: large radiating 8-pointed star with concentric diamond rings -->
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Corner triangles (background) -->
  <polygon points="0,0 87.5,0 0,87.5" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,0 300,87.5 212.5,0" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,300 212.5,300 300,212.5" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="0,300 0,212.5 87.5,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Outermost ring of diamonds (D0D0D0) — ring 3 -->
  <!-- Top -->
  <polygon points="150,0 175,37.5 150,75 125,37.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Top-right -->
  <polygon points="212.5,0 237.5,37.5 175,37.5 150,0" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,87.5 262.5,112.5 237.5,37.5 262.5,12.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="262.5,12.5 237.5,37.5 212.5,0 237.5,0" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Right -->
  <polygon points="300,150 262.5,175 225,150 262.5,125" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,87.5 300,150 262.5,125 262.5,112.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right -->
  <polygon points="300,212.5 262.5,187.5 262.5,175 300,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,212.5 262.5,287.5 237.5,262.5 262.5,187.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="262.5,287.5 237.5,300 212.5,300 237.5,262.5" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom -->
  <polygon points="150,300 125,262.5 150,225 175,262.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="212.5,300 175,262.5 237.5,262.5 150,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left -->
  <polygon points="0,212.5 37.5,187.5 37.5,262.5 0,212.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="87.5,300 62.5,262.5 125,262.5 150,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="37.5,262.5 62.5,262.5 87.5,300 37.5,287.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="37.5,287.5 62.5,300 0,300 0,212.5 37.5,262.5" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Left -->
  <polygon points="0,150 37.5,125 75,150 37.5,175" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 0,87.5 37.5,112.5 37.5,125" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,212.5 0,150 37.5,175 37.5,187.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Top-left -->
  <polygon points="0,87.5 37.5,37.5 37.5,112.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="87.5,0 125,37.5 62.5,37.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="37.5,37.5 62.5,37.5 87.5,0 62.5,0" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="0,87.5 37.5,37.5 0,62.5" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Middle ring of diamonds (B0B0B0) — ring 2 -->
  <polygon points="150,75 175,112.5 150,150 125,112.5" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="175,37.5 212.5,75 175,112.5 150,75" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="262.5,112.5 225,150 212.5,75 237.5,37.5" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="225,150 262.5,175 225,212.5 187.5,175" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="262.5,187.5 237.5,262.5 225,212.5 262.5,175" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="150,225 175,187.5 175,262.5 150,225" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="225,212.5 175,262.5 175,187.5 212.5,225" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="150,225 125,262.5 125,187.5" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="75,212.5 125,187.5 125,262.5 62.5,262.5" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="75,150 37.5,125 75,87.5 112.5,125" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="37.5,112.5 37.5,37.5 75,87.5 37.5,125" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="75,87.5 62.5,37.5 125,37.5 125,112.5" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="37.5,187.5 75,150 112.5,175 75,212.5" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="187.5,112.5 225,150 187.5,175 150,150" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="212.5,75 225,150 187.5,112.5" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Inner ring / center star (505050) — ring 1 -->
  <polygon points="112.5,125 150,150 125,112.5" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,150 187.5,175 175,187.5" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,150 175,112.5 187.5,125" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="125,187.5 112.5,175 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>