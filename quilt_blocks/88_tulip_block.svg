<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Left petal -->
  <polygon points="75,120 110,30 150,120" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Center petal -->
  <polygon points="110,120 150,15 190,120" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Right petal -->
  <polygon points="150,120 190,30 225,120" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Stem -->
  <rect x="143" y="120" width="14" height="130" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Left leaf -->
  <polygon points="143,200 60,170 100,220" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Right leaf -->
  <polygon points="157,200 240,170 200,220" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Base/pot -->
  <polygon points="100,250 200,250 180,300 120,300" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
</svg>