<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Double Pinwheel: Traditional simple version — 2x2 grid of HSTs creating pinwheel.
       Scale: 12" = 300 units. Each quadrant = 6" = 150 units.
       8 HSTs total (2 per quadrant). Two fabrics alternating.
       Cut: four 6½" squares from Fabric A, four 6½" from Fabric B.
       Pair and cut diagonally to make 8 HSTs, each finishing at 6". -->
  <!-- Top-left quadrant: dark upper-left, light lower-right -->
  <polygon points="0,0 150,0 0,150" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="150,0 150,150 0,150" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Top-right quadrant: light upper-left, dark lower-right -->
  <polygon points="150,0 300,0 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="300,0 300,150 150,150" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Bottom-left quadrant: light upper-left, dark lower-right -->
  <polygon points="0,150 150,150 0,300" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="150,150 150,300 0,300" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Bottom-right quadrant: dark upper-left, light lower-right -->
  <polygon points="150,150 300,150 150,300" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="300,150 300,300 150,300" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
</svg>
