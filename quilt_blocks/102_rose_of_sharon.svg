<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Diagonal leaves (at 45-degree positions) -->
  <!-- Top-left leaf -->
  <path d="M 150,150 Q 60,60 80,40 Q 100,20 150,150" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Top-right leaf -->
  <path d="M 150,150 Q 240,60 220,40 Q 200,20 150,150" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left leaf -->
  <path d="M 150,150 Q 60,240 80,260 Q 100,280 150,150" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right leaf -->
  <path d="M 150,150 Q 240,240 220,260 Q 200,280 150,150" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Cardinal petals (heart-shaped/rounded at N, S, E, W) -->
  <!-- Top petal -->
  <path d="M 150,150 Q 115,60 130,30 Q 150,10 170,30 Q 185,60 150,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Right petal -->
  <path d="M 150,150 Q 240,115 270,130 Q 290,150 270,170 Q 240,185 150,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom petal -->
  <path d="M 150,150 Q 115,240 130,270 Q 150,290 170,270 Q 185,240 150,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Left petal -->
  <path d="M 150,150 Q 60,115 30,130 Q 10,150 30,170 Q 60,185 150,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Inner ring -->
  <circle cx="150" cy="150" r="35" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Center circle -->
  <circle cx="150" cy="150" r="20" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>