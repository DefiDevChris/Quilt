<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Courthouse Steps: Traditional symmetric Log Cabin.
       Scale: 12" = 300 units, 1" = 25 units.
       Center: 4" = 100 units. Strip width: 2" = 50 units.
       Center at (100,100) to (200,200). After 2 rounds, spans (0,0) to (300,300).
       9 pieces: 1 center + 8 strips (4 per round × 2 rounds). -->
  <!-- Center: 4" x 4" -->
  <rect x="100" y="100" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Round 1: strips 2" wide, starting from 4" center -->
  <!-- Top: 4" long, at y=50-100, x=100-200 -->
  <rect x="100" y="50" width="100" height="50" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Right: 8" tall (4" center + 4" top already placed), at x=200-250, y=50-250 -->
  <rect x="200" y="50" width="50" height="200" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Bottom: 8" wide (4" center + 4" right already placed), at x=50-250, y=200-250 -->
  <rect x="50" y="200" width="200" height="50" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Left: 12" tall (full height after R1), at x=50-100, y=50-250 -->
  <rect x="50" y="50" width="50" height="200" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- After R1: block spans x: 50-250 (200=8"), y: 50-250 (200=8") ✓ -->
  <!-- Round 2: strips 2" wide, extending to 12" -->
  <!-- Top: 8" wide, at x=50-250, y=0-50 -->
  <rect x="50" y="0" width="200" height="50" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Right: 12" tall, at x=250-300, y=0-300 -->
  <rect x="250" y="0" width="50" height="300" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Bottom: 12" wide, at x=0-300, y=250-300 -->
  <rect x="0" y="250" width="300" height="50" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Left: 12" tall, at x=0-50, y=0-300 -->
  <rect x="0" y="0" width="50" height="300" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- After R2: block spans x: 0-300 (300=12"), y: 0-300 (300=12") ✓ -->
</svg>
