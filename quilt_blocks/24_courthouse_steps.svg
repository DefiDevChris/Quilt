<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Courthouse Steps: symmetric Log Cabin with concentric strips on opposing sides -->
  <!-- 6x6 grid (50px cells) -->
  <!-- Outermost ring: top and bottom strips in #E0E0E0 -->
  <rect x="0" y="0" width="300" height="50" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <rect x="0" y="250" width="300" height="50" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Outermost ring: left and right strips in #D0D0D0 -->
  <rect x="0" y="50" width="50" height="200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <rect x="250" y="50" width="50" height="200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Second ring: top and bottom strips in #D0D0D0 -->
  <rect x="50" y="50" width="200" height="50" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <rect x="50" y="200" width="200" height="50" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Second ring: left and right strips in #E0E0E0 -->
  <rect x="50" y="100" width="50" height="100" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <rect x="200" y="100" width="50" height="100" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Center square -->
  <rect x="100" y="100" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>