<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Center square (hearth) -->
  <rect x="125" y="125" width="50" height="50" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Round 1 -->
  <rect x="175" y="125" width="25" height="50" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <rect x="125" y="175" width="75" height="25" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <rect x="100" y="125" width="25" height="75" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <rect x="100" y="100" width="100" height="25" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Round 2 -->
  <rect x="200" y="100" width="25" height="100" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <rect x="100" y="200" width="125" height="25" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <rect x="75" y="100" width="25" height="125" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <rect x="75" y="75" width="150" height="25" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Round 3 -->
  <rect x="225" y="75" width="25" height="150" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <rect x="75" y="225" width="175" height="25" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <rect x="50" y="75" width="25" height="175" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <rect x="50" y="50" width="200" height="25" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Round 4 -->
  <rect x="250" y="50" width="25" height="200" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <rect x="50" y="250" width="225" height="25" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <rect x="25" y="50" width="25" height="225" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <rect x="25" y="25" width="250" height="25" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Round 5 -->
  <rect x="275" y="25" width="25" height="250" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <rect x="25" y="275" width="275" height="25" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <rect x="0" y="25" width="25" height="275" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <rect x="0" y="0" width="300" height="25" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
</svg>
