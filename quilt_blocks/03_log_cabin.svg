<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Log Cabin: 12" finished, 2" wide strips, traditional light/dark split.
       Scale: 1" = 25 units. Original spans (1,-1) to (13,11) inches.
       Shifted by (-1,+1) inch = (-25,+25) units to fit 0-300 viewBox.
       11 pieces total: 1 center + 10 strips. -->
  <!-- Center: 2"x2" originally at (5,5)-(7,7)in, shifted to (4,6)in = (100,150)px -->
  <rect x="100" y="150" width="50" height="50" fill="#D4A574" stroke="#333" stroke-width="1" data-shade="center" data-role="patch"/>
  <!-- Round 1 (light): Top + Right. Block 2x2 → 4x4 -->
  <!-- Top: originally (5,3)-(7,5)in, shifted to (4,4)in = (100,100)px -->
  <rect x="100" y="100" width="50" height="50" fill="#F5E6D3" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Right: originally (7,3)-(9,7)in, shifted to (6,4)in = (150,100)px, 50x100 -->
  <rect x="150" y="100" width="50" height="100" fill="#F5E6D3" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Round 2 (dark): Bottom + Left. Block 4x4 → 6x6 -->
  <!-- Bottom: originally (5,7)-(9,9)in, shifted to (4,8)in = (100,200)px, 100x50 -->
  <rect x="100" y="200" width="100" height="50" fill="#8B4513" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Left: originally (3,3)-(5,9)in, shifted to (2,4)in = (50,100)px, 50x150 -->
  <rect x="50" y="100" width="50" height="150" fill="#8B4513" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Round 3 (light): Top + Right. Block 6x6 → 8x8 -->
  <!-- Top: originally (3,1)-(9,3)in, shifted to (2,2)in = (50,50)px, 150x50 -->
  <rect x="50" y="50" width="150" height="50" fill="#F5E6D3" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Right: originally (9,1)-(11,9)in, shifted to (8,2)in = (200,50)px, 50x200 -->
  <rect x="200" y="50" width="50" height="200" fill="#F5E6D3" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Round 4 (dark): Bottom + Left. Block 8x8 → 10x10 -->
  <!-- Bottom: originally (3,9)-(11,11)in, shifted to (2,10)in = (50,250)px, 200x50 -->
  <rect x="50" y="250" width="200" height="50" fill="#8B4513" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Left: originally (1,1)-(3,11)in, shifted to (0,2)in = (0,50)px, 50x250 -->
  <rect x="0" y="50" width="50" height="250" fill="#8B4513" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Round 5 (light): Top + Right. Block 10x10 → 12x12 -->
  <!-- Top: originally (1,-1)-(11,1)in, shifted to (0,0)in = (0,0)px, 250x50 -->
  <rect x="0" y="0" width="250" height="50" fill="#F5E6D3" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Right: originally (11,-1)-(13,11)in, shifted to (10,0)in = (250,0)px, 50x300 -->
  <rect x="250" y="0" width="50" height="300" fill="#F5E6D3" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
</svg>
