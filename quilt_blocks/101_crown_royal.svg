<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background - 3x3 grid (100px cells) -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Crown base (bottom two rows) -->
  <rect x="0" y="200" width="300" height="100" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Crown band -->
  <rect x="0" y="160" width="300" height="40" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Crown body (middle section) -->
  <rect x="0" y="100" width="300" height="60" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Crown points - three triangular points -->
  <!-- Left point -->
  <polygon points="10,100 50,20 90,100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Center point (tallest) -->
  <polygon points="110,100 150,5 190,100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Right point -->
  <polygon points="210,100 250,20 290,100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Gem on left point -->
  <circle cx="50" cy="65" r="10" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Gem on center point -->
  <circle cx="150" cy="55" r="12" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Gem on right point -->
  <circle cx="250" cy="65" r="10" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Band gems -->
  <circle cx="75" cy="180" r="8" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <circle cx="150" cy="180" r="8" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <circle cx="225" cy="180" r="8" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Crown base detail lines -->
  <rect x="0" y="245" width="300" height="4" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
</svg>