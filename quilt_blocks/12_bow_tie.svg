<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Bow Tie: Traditional 2x2 four-patch construction.
       Scale: 12" = 300 units, 1" = 25 units. Each quadrant = 6" = 150 units.
       2 quadrants are solid dark squares (bow tie wings).
       2 quadrants are background squares with snowball triangles at inner corners.
       Cut sizes: Fabric A (dark): two 6.5" squares + two 3" squares (for snowballs).
                  Fabric B (bg): two 6.5" squares.
       Snowball triangles: 3" squares cut diagonally → 2 triangles per square.
       Each snowball triangle finishes at ~2" at the corner. -->
  <!-- Top-left quadrant: solid dark square (bow tie wing) -->
  <rect x="0" y="0" width="150" height="150" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Top-right quadrant: background with snowball triangles at inner (bottom-left) corner -->
  <rect x="150" y="0" width="150" height="150" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Snowball triangle at inner corner of top-right (dark triangle pointing toward center) -->
  <polygon points="150,150 200,150 150,100" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Bottom-left quadrant: background with snowball triangles at inner (top-right) corner -->
  <rect x="0" y="150" width="150" height="150" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Snowball triangle at inner corner of bottom-left (dark triangle pointing toward center) -->
  <polygon points="150,150 150,200 100,150" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Bottom-right quadrant: solid dark square (bow tie wing) -->
  <rect x="150" y="150" width="150" height="150" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
</svg>
