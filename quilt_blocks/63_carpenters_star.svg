<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Carpenter's Star: 4x4 grid (75px cells), large 8-pointed star -->
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Corner background squares -->
  <rect x="0" y="0" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="225" y="0" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="0" y="225" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="225" y="225" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Star points extending to edges (8 triangles in D0D0D0) -->
  <!-- Top star point -->
  <polygon points="150,0 75,75 225,75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Right star point -->
  <polygon points="300,150 225,75 225,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom star point -->
  <polygon points="150,300 225,225 75,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Left star point -->
  <polygon points="0,150 75,225 75,75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Corner triangles filling gaps between star points and corners -->
  <!-- Top-left -->
  <polygon points="0,0 75,75 150,0" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="0,0 75,75 0,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Top-right -->
  <polygon points="300,0 225,75 150,0" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,0 225,75 300,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right -->
  <polygon points="300,300 225,225 150,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,300 225,225 300,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left -->
  <polygon points="0,300 75,225 150,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="0,300 75,225 0,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Center square-in-square: outer square -->
  <rect x="75" y="75" width="150" height="150" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Center diamond -->
  <polygon points="150,75 225,150 150,225 75,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Inner diamond -->
  <polygon points="150,105 195,150 150,195 105,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
</svg>