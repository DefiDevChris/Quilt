<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Center four-patch -->
  <rect x="112.5" y="112.5" width="37.5" height="37.5" fill="#505050" stroke="#333" stroke-width="1"/>
  <rect x="150" y="112.5" width="37.5" height="37.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <rect x="112.5" y="150" width="37.5" height="37.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <rect x="150" y="150" width="37.5" height="37.5" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Round 1 triangles -->
  <polygon points="112.5,112.5 187.5,112.5 150,75" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="187.5,112.5 187.5,187.5 225,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="187.5,187.5 112.5,187.5 150,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="112.5,187.5 112.5,112.5 75,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Round 2 triangles -->
  <polygon points="150,75 225,150 225,75" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="225,150 150,225 225,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,225 75,150 75,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="75,150 150,75 75,75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Round 3 triangles -->
  <polygon points="75,75 225,75 150,0" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="225,75 225,225 300,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="225,225 75,225 150,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="75,225 75,75 0,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Round 4 triangles -->
  <polygon points="150,0 300,150 300,0" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,150 150,300 300,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,300 0,150 0,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 150,0 0,0" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
</svg>
