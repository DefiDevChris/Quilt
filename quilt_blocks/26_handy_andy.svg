<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Handy Andy: 3x3 grid (100px cells) -->
  <!-- Background fill -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Center square dark -->
  <rect x="100" y="100" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- 4 side HSTs with points toward center -->
  <!-- Top side: dark triangle pointing down -->
  <rect x="100" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="100,0 200,0 150,100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom side: dark triangle pointing up -->
  <rect x="100" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="100,300 200,300 150,200" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Left side: dark triangle pointing right -->
  <rect x="0" y="100" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="0,100 0,200 100,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Right side: dark triangle pointing left -->
  <rect x="200" y="100" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,100 300,200 200,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- 4 corner diamonds (rotated 45deg squares) -->
  <!-- Top-left corner diamond -->
  <polygon points="50,10 90,50 50,90 10,50" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Top-right corner diamond -->
  <polygon points="250,10 290,50 250,90 210,50" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left corner diamond -->
  <polygon points="50,210 90,250 50,290 10,250" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right corner diamond -->
  <polygon points="250,210 290,250 250,290 210,250" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>