<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Basket: 3x3 grid with triangular basket body and handle -->
  <!-- Full background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Basket body: large triangle in lower portion -->
  <!-- Bottom-left HST: dark lower-left -->
  <polygon points="0,200 100,200 0,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="100,200 100,300 0,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-center: dark -->
  <rect x="100" y="200" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right HST: dark lower-right -->
  <polygon points="200,200 300,200 300,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="200,200 300,300 200,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Middle-left: background -->
  <rect x="0" y="100" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Middle-center: HST for basket top edge -->
  <polygon points="100,100 200,100 100,200" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="200,100 200,200 100,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Middle-right: background -->
  <rect x="200" y="100" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Handle: arc above the basket -->
  <path d="M 100,100 Q 50,30 150,50 Q 250,30 200,100" fill="none" stroke="#505050" stroke-width="4"/>
</svg>
