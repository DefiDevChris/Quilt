<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Double Four Patch: 2x2 grid, top-left and bottom-right are mini 4-patches, other two are solid -->
  <!-- Top-left quadrant: mini 4-patch -->
  <rect x="0" y="0" width="75" height="75" fill="#505050" stroke="#333" stroke-width="1"/>
  <rect x="75" y="0" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="0" y="75" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="75" y="75" width="75" height="75" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Top-right quadrant: solid -->
  <rect x="150" y="0" width="150" height="150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left quadrant: solid -->
  <rect x="0" y="150" width="150" height="150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right quadrant: mini 4-patch -->
  <rect x="150" y="150" width="75" height="75" fill="#505050" stroke="#333" stroke-width="1"/>
  <rect x="225" y="150" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="150" y="225" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="225" y="225" width="75" height="75" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>
