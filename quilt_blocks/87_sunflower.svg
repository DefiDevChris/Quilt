<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Outer petal ring - 10 petals as wedge polygons -->
  <!-- Petal N -->
  <polygon points="150,150 120,15 150,5 180,15" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Petal NNE -->
  <polygon points="150,150 180,15 210,40 225,75" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Petal E -->
  <polygon points="150,150 225,75 295,120 295,180" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Petal ESE -->
  <polygon points="150,150 295,180 280,225 245,260" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Petal S -->
  <polygon points="150,150 245,260 210,290 180,295" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Petal SSW -->
  <polygon points="150,150 180,295 120,295 90,290" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Petal W -->
  <polygon points="150,150 90,290 55,260 5,180" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Petal WNW -->
  <polygon points="150,150 5,180 5,120 20,75" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Petal NNW -->
  <polygon points="150,150 20,75 55,40 90,15" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Petal NW fill -->
  <polygon points="150,150 90,15 120,15" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Inner ring -->
  <circle cx="150" cy="150" r="55" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Center circle -->
  <circle cx="150" cy="150" r="35" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>