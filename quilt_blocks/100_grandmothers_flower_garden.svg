  <!-- Bottom-right hexagon -->
  <polygon points="224,150 261,171.5 261,214.5 224,236 187,214.5 187,171.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom hexagon -->
  <polygon points="150,193 187,214.5 187,257.5 150,279 113,257.5 113,214.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left hexagon -->
