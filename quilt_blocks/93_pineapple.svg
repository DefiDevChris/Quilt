<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Outermost ring (corners) - triangular fills -->
  <!-- Top-left corner -->
  <polygon points="0,0 150,0 0,150" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Top-right corner -->
  <polygon points="150,0 300,0 300,150" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right corner -->
  <polygon points="300,150 300,300 150,300" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left corner -->
  <polygon points="0,150 150,300 0,300" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Third ring (diagonal strips) -->
  <!-- Top -->
  <polygon points="75,0 225,0 150,75" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Right -->
  <polygon points="300,75 300,225 225,150" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Bottom -->
  <polygon points="75,300 225,300 150,225" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Left -->
  <polygon points="0,75 0,225 75,150" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Second ring -->
  <!-- Top -->
  <polygon points="100,37.5 200,37.5 150,100" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Right -->
  <polygon points="262.5,100 262.5,200 200,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom -->
  <polygon points="100,262.5 200,262.5 150,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Left -->
  <polygon points="37.5,100 37.5,200 100,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Inner diamond ring -->
  <polygon points="150,75 225,150 150,225 75,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Inner smaller diamond -->
  <polygon points="150,100 200,150 150,200 100,150" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Center square (on point) -->
  <polygon points="150,120 180,150 150,180 120,150" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>