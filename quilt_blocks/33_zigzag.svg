<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- 4x4 grid = 75px cells, zigzag pattern using alternating triangles -->
  <!-- Row 1 -->
  <polygon points="0,0 75,0 75,75" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="0,0 0,75 75,75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="75,0 150,0 75,75" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 150,75 75,75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 225,0 225,75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 150,75 225,75" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="225,0 300,0 225,75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,0 300,75 225,75" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Row 2 -->
  <polygon points="0,75 75,75 0,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="75,75 75,150 0,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="75,75 150,75 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="75,75 75,150 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,75 225,75 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="225,75 225,150 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="225,75 300,75 300,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="225,75 225,150 300,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Row 3 -->
  <polygon points="0,150 75,150 75,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 0,225 75,225" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="75,150 150,150 75,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,150 150,225 75,225" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="150,150 225,150 225,225" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="150,150 150,225 225,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="225,150 300,150 225,225" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,150 300,225 225,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Row 4 -->
  <polygon points="0,225 75,225 0,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="75,225 75,300 0,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="75,225 150,225 150,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="75,225 75,300 150,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,225 225,225 150,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="225,225 225,300 150,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="225,225 300,225 300,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="225,225 225,300 300,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
</svg>