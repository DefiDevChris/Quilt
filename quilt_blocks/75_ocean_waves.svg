<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Ocean Waves: 4x4 grid (75px cells) with HSTs forming diagonal wave pattern -->
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Row 0 (y=0-75) -->
  <!-- Cell 0,0 -->
  <polygon points="0,0 75,0 0,75" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="75,0 75,75 0,75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Cell 1,0 -->
  <polygon points="75,0 150,0 75,75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 150,75 75,75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Cell 2,0 -->
  <polygon points="150,0 225,0 150,75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="225,0 225,75 150,75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Cell 3,0 -->
  <polygon points="225,0 300,0 225,75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,0 300,75 225,75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Row 1 (y=75-150) -->
  <!-- Cell 0,1 -->
  <polygon points="0,75 75,75 0,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="75,75 75,150 0,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Cell 1,1 -->
  <polygon points="75,75 150,75 75,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,75 150,150 75,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Cell 2,1 -->
  <polygon points="150,75 225,75 150,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="225,75 225,150 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Cell 3,1 -->
  <polygon points="225,75 300,75 225,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,75 300,150 225,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Row 2 (y=150-225) -->
  <!-- Cell 0,2 -->
  <polygon points="0,150 75,150 0,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="75,150 75,225 0,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Cell 1,2 -->
  <polygon points="75,150 150,150 75,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,150 150,225 75,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Cell 2,2 -->
  <polygon points="150,150 225,150 150,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="225,150 225,225 150,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Cell 3,2 -->
  <polygon points="225,150 300,150 225,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,150 300,225 225,225" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Row 3 (y=225-300) -->
  <!-- Cell 0,3 -->
  <polygon points="0,225 75,225 0,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="75,225 75,300 0,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Cell 1,3 -->
  <polygon points="75,225 150,225 75,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,225 150,300 75,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Cell 2,3 -->
  <polygon points="150,225 225,225 150,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="225,225 225,300 150,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Cell 3,3 -->
  <polygon points="225,225 300,225 225,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="300,225 300,300 225,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
</svg>