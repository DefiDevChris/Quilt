<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Spider Web: 8 triangles radiating from center, alternating colors -->
  <!-- Corner triangles fill the square -->
  <!-- Center point: 150,150 -->
  <!-- Edge midpoints: top=150,0 right=300,150 bottom=150,300 left=0,150 -->
  <!-- Corners: TL=0,0 TR=300,0 BR=300,300 BL=0,300 -->
  <!-- 8 main triangles from center to edges -->
  <!-- Top triangle (center to top-left corner to top midpoint) -->
  <polygon points="150,150 0,0 150,0" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Top-right triangle (center to top midpoint to top-right corner) -->
  <polygon points="150,150 150,0 300,0" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Right triangle (center to top-right corner to right midpoint) -->
  <polygon points="150,150 300,0 300,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right triangle (center to right midpoint to bottom-right corner) -->
  <polygon points="150,150 300,150 300,300" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Bottom triangle (center to bottom-right corner to bottom midpoint) -->
  <polygon points="150,150 300,300 150,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left triangle (center to bottom midpoint to bottom-left corner) -->
  <polygon points="150,150 150,300 0,300" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Left triangle (center to bottom-left corner to left midpoint) -->
  <polygon points="150,150 0,300 0,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Top-left triangle (center to left midpoint to top-left corner) -->
  <polygon points="150,150 0,150 0,0" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
</svg>