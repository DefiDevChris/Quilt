<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Dutchman's Puzzle: 4 flying-geese units in a pinwheel arrangement -->
  <!-- Each quadrant has a flying-geese unit (rectangle with center triangle) -->
  <!-- Top-left quadrant: goose flies right (pointing right) -->
  <rect x="0" y="0" width="150" height="150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Top-left: flying goose pointing toward top-right -->
  <polygon points="0,0 150,75 0,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Small side triangles -->
  <polygon points="0,0 150,0 150,75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="150,75 150,150 0,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Top-right quadrant: goose flies down -->
  <rect x="150" y="0" width="150" height="150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 300,0 225,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 225,150 150,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,0 300,150 225,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right quadrant: goose flies left -->
  <rect x="150" y="150" width="150" height="150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,150 300,300 150,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,150 300,150 150,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="150,225 150,300 300,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left quadrant: goose flies up -->
  <rect x="0" y="150" width="150" height="150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="0,300 150,300 75,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 75,150 0,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="75,150 150,150 150,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
</svg>
