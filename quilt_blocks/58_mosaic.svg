<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Mosaic: 3x3 grid where every cell is an HST, creating tessellated mosaic -->
  <!-- Row 0 -->
  <!-- (0,0): dark upper-left -->
  <polygon points="0,0 100,0 0,100" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="100,0 100,100 0,100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- (1,0): dark upper-right -->
  <polygon points="100,0 200,0 200,100" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="100,0 100,100 200,100" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- (2,0): dark upper-left -->
  <polygon points="200,0 300,0 200,100" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="300,0 300,100 200,100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Row 1 -->
  <!-- (0,1): dark lower-left -->
  <polygon points="0,100 100,100 0,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="100,100 100,200 0,200" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- (1,1): dark upper-left (center large HST) -->
  <polygon points="100,100 200,100 100,200" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="200,100 200,200 100,200" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- (2,1): dark lower-right -->
  <polygon points="200,100 300,100 300,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="200,100 200,200 300,200" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Row 2 -->
  <!-- (0,2): dark lower-left -->
  <polygon points="0,200 100,200 0,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="100,200 100,300 0,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- (1,2): dark lower-right -->
  <polygon points="100,200 200,200 200,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="100,200 100,300 200,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- (2,2): dark lower-left -->
  <polygon points="200,200 300,200 200,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="300,200 300,300 200,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
</svg>