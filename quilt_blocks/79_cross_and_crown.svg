<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Cross and Crown: 6x6 grid (50px cells), center cross with crown triangles -->
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Cross shape (505050) — center column and center row -->
  <!-- Vertical bar of cross -->
  <rect x="100" y="0" width="100" height="300" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Horizontal bar of cross -->
  <rect x="0" y="100" width="300" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Corner squares restored to background -->
  <rect x="0" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="200" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="0" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="200" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Crown triangular points on each arm of the cross (D0D0D0) -->
  <!-- Top arm crown points -->
  <polygon points="100,0 150,50 100,50" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="200,0 200,50 150,50" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Right arm crown points -->
  <polygon points="300,100 250,150 250,100" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,200 250,200 250,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom arm crown points -->
  <polygon points="200,300 150,250 200,250" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="100,300 100,250 150,250" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Left arm crown points -->
  <polygon points="0,200 50,150 50,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,100 50,100 50,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Additional crown accent triangles pointing into corners -->
  <polygon points="100,100 50,50 100,50" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="100,100 50,100 50,50" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="200,100 250,50 200,50" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="200,100 250,100 250,50" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="200,200 250,250 200,250" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="200,200 250,200 250,250" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="100,200 50,250 100,250" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="100,200 50,200 50,250" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Center square accent -->
  <rect x="125" y="125" width="50" height="50" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
</svg>