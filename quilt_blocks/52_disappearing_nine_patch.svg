<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Disappearing Nine Patch: nine-patch cut diagonally and re-sewn -->
  <!-- Creates 4 quadrants, each showing quarter of original nine-patch rotated -->
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Top-left quadrant: shows corner of nine-patch -->
  <rect x="0" y="0" width="75" height="75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="75,0 150,0 75,75" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="0,75 75,75 0,150" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="75,75 150,0 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="75,75 0,150 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Top-right quadrant -->
  <rect x="225" y="0" width="75" height="75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 225,0 225,75" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="225,75 300,75 300,150" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 150,150 225,75" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="225,75 300,150 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left quadrant -->
  <rect x="0" y="225" width="75" height="75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 75,225 0,225" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="75,225 75,300 150,300" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 150,150 75,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="75,225 150,300 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right quadrant -->
  <rect x="225" y="225" width="75" height="75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="225,225 300,150 300,225" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="150,300 225,225 225,300" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="150,150 300,150 225,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,150 150,300 225,225" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>