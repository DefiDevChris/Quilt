<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Winged Arrow: 4 QST units in 2×2 grid (150px each).
       Dark and medium triangles on adjacent sides create arrow/wing shapes. -->
  <!-- Top-left QST: dark=top, medium=left, bg=right+bottom -->
  <polygon points="0,0 150,0 75,75" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="0,0 75,75 0,150" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="150,0 150,150 75,75" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="0,150 75,75 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Top-right QST: dark=top, medium=right, bg=left+bottom -->
  <polygon points="150,0 300,0 225,75" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="300,0 300,150 225,75" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="150,0 225,75 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="225,75 300,150 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Bottom-left QST: dark=bottom, medium=left, bg=top+right -->
  <polygon points="0,300 150,300 75,225" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="0,150 0,300 75,225" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="0,150 75,225 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="75,225 150,300 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Bottom-right QST: dark=bottom, medium=right, bg=top+left -->
  <polygon points="150,300 300,300 225,225" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="300,150 300,300 225,225" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="150,150 225,225 150,300" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="150,150 300,150 225,225" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
</svg>
