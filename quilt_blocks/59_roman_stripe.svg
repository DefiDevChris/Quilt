<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Roman Stripe: square divided diagonally, one half has parallel diagonal stripes -->
  <!-- Light solid triangle (upper-right half) -->
  <polygon points="0,0 300,0 300,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Lower-left half with diagonal stripes -->
  <!-- Full lower-left triangle as base -->
  <polygon points="0,0 300,300 0,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Stripe 1 (darkest, closest to diagonal) -->
  <polygon points="0,0 0,60 240,300 300,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Stripe 2 -->
  <polygon points="0,120 0,180 120,300 60,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Stripe 3 -->
  <polygon points="0,240 0,300 60,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Stripe accent bands -->
  <polygon points="0,60 0,120 180,300 240,300" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <polygon points="0,180 0,240 60,300 120,300" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Outer border stroke -->
  <rect x="0" y="0" width="300" height="300" fill="none" stroke="#333" stroke-width="1"/>
</svg>