<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Hourglass: Quarter-square triangle unit, top and bottom dark triangles -->
  <!-- Left triangle (background) -->
  <polygon points="0,0 150,150 0,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Top triangle (dark - hourglass top) -->
  <polygon points="0,0 300,0 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Right triangle (background) -->
  <polygon points="300,0 300,300 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom triangle (dark - hourglass bottom) -->
  <polygon points="0,300 150,150 300,300" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>
