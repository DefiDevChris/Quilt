<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Spinning Top: 3x3 grid (100px cells), asymmetric triangles suggesting clockwise rotation -->
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Top-left quadrant: triangle pointing right -->
  <polygon points="0,0 150,0 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="0,0 0,150 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Top-right quadrant: triangle pointing down -->
  <polygon points="150,0 300,0 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="300,0 300,150 150,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right quadrant: triangle pointing left -->
  <polygon points="300,150 300,300 150,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="300,300 150,300 150,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left quadrant: triangle pointing up -->
  <polygon points="0,150 150,150 150,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 0,300 150,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Center accent square -->
  <polygon points="125,125 175,125 175,175 125,175" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
</svg>