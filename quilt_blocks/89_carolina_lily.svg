<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Left petal (diamond shape) -->
  <polygon points="60,130 105,60 150,130 105,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Center petal (diamond shape, taller) -->
  <polygon points="110,140 150,25 190,140 150,210" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Right petal (diamond shape) -->
  <polygon points="150,130 195,60 240,130 195,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Stem -->
  <rect x="144" y="180" width="12" height="90" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Left leaf -->
  <polygon points="144,230 70,200 110,250" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Right leaf -->
  <polygon points="156,230 230,200 190,250" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Base -->
  <rect x="75" y="270" width="150" height="30" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
</svg>