  <rect x="0" y="90" width="300" height="15" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <rect x="0" y="105" width="300" height="35" fill="#505050" stroke="#333" stroke-width="1"/>
  <rect x="0" y="140" width="300" height="25" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <rect x="0" y="165" width="300" height="30" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <rect x="0" y="195" width="300" height="20" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <rect x="0" y="215" width="300" height="40" fill="#505050" stroke="#333" stroke-width="1"/>
