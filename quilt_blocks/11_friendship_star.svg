<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Corner squares (background) -->
  <rect x="0" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <rect x="200" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <rect x="0" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <rect x="200" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Center square (dark) -->
  <rect x="100" y="100" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Top-center HST: light upper-right, dark lower-left (dark toward center) -->
  <polygon points="100,0 200,0 200,100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="100,0 100,100 200,100" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Right-center HST: light lower-right, dark upper-left (dark toward center) -->
  <polygon points="200,100 300,100 200,200" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="300,100 300,200 200,200" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Bottom-center HST: light lower-left, dark upper-right (dark toward center) -->
  <polygon points="100,200 200,200 200,300" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="100,200 100,300 200,300" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Left-center HST: light upper-left, dark lower-right (dark toward center) -->
  <polygon points="0,100 100,100 0,200" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="100,100 100,200 0,200" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
</svg>
