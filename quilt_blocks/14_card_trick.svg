<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Card Trick: 3x3 grid of QSTs. A=#505050, B=#B0B0B0, C=#D0D0D0, BG=#F8F8F8 -->
  <!-- Cell (0,0): Top=BG Right=A Bottom=A Left=BG -->
  <polygon points="0,0 100,0 50,50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="100,0 100,100 50,50" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="100,100 0,100 50,50" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="0,100 0,0 50,50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Cell (0,1): Top=BG Right=B Bottom=A Left=A -->
  <polygon points="100,0 200,0 150,50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="200,0 200,100 150,50" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="200,100 100,100 150,50" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="100,100 100,0 150,50" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Cell (0,2): Top=BG Right=BG Bottom=B Left=B -->
  <polygon points="200,0 300,0 250,50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="300,0 300,100 250,50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="300,100 200,100 250,50" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="200,100 200,0 250,50" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Cell (1,0): Top=A Right=C Bottom=C Left=BG -->
  <polygon points="0,100 100,100 50,150" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="100,100 100,200 50,150" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium-light" data-role="patch"/>
  <polygon points="100,200 0,200 50,150" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium-light" data-role="patch"/>
  <polygon points="0,200 0,100 50,150" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Cell (1,1): Top=A Right=B Bottom=C Left=C (center — all 3 cards converge) -->
  <polygon points="100,100 200,100 150,150" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="200,100 200,200 150,150" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="200,200 100,200 150,150" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium-light" data-role="patch"/>
  <polygon points="100,200 100,100 150,150" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium-light" data-role="patch"/>
  <!-- Cell (1,2): Top=B Right=BG Bottom=BG Left=C -->
  <polygon points="200,100 300,100 250,150" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="300,100 300,200 250,150" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="300,200 200,200 250,150" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="200,200 200,100 250,150" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium-light" data-role="patch"/>
  <!-- Cell (2,0): Top=BG Right=C Bottom=BG Left=BG -->
  <polygon points="0,200 100,200 50,250" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="100,200 100,300 50,250" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium-light" data-role="patch"/>
  <polygon points="100,300 0,300 50,250" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="0,300 0,200 50,250" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Cell (2,1): Top=C Right=C Bottom=BG Left=BG -->
  <polygon points="100,200 200,200 150,250" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium-light" data-role="patch"/>
  <polygon points="200,200 200,300 150,250" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium-light" data-role="patch"/>
  <polygon points="200,300 100,300 150,250" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="100,300 100,200 150,250" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Cell (2,2): Top=C Right=BG Bottom=BG Left=BG -->
  <polygon points="200,200 300,200 250,250" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium-light" data-role="patch"/>
  <polygon points="300,200 300,300 250,250" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="300,300 200,300 250,250" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="200,300 200,200 250,250" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
</svg>
