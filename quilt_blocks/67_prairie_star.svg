<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Prairie Star: 3x3 grid (100px cells), large 8-pointed star -->
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Corner cells with accent triangles -->
  <!-- Top-left corner -->
  <rect x="0" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="100,0 100,100 50,50" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Top-right corner -->
  <rect x="200" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="200,0 200,100 250,50" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left corner -->
  <rect x="0" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="100,200 100,300 50,250" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right corner -->
  <rect x="200" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="200,200 200,300 250,250" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Side cells with large star point triangles (D0D0D0) -->
  <!-- Top side -->
  <rect x="100" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="100,100 150,0 200,100" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Right side -->
  <rect x="200" y="100" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="200,100 300,150 200,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom side -->
  <rect x="100" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="100,200 150,300 200,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Left side -->
  <rect x="0" y="100" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="100,100 0,150 100,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Center square -->
  <rect x="100" y="100" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
</svg>