<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Top tier (smallest) -->
  <polygon points="150,15 110,75 190,75" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Background triangles flanking top tier -->
  <polygon points="0,0 150,0 110,75 0,75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 300,0 300,75 190,75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Second tier -->
  <polygon points="150,60 90,140 210,140" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Background triangles flanking second tier -->
  <polygon points="0,75 110,75 90,140 0,140" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="190,75 300,75 300,140 210,140" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Third tier -->
  <polygon points="150,125 70,220 230,220" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Background triangles flanking third tier -->
  <polygon points="0,140 90,140 70,220 0,220" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="210,140 300,140 300,220 230,220" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Fourth tier (widest) -->
  <polygon points="150,200 50,280 250,280" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Background triangles flanking fourth tier -->
  <polygon points="0,220 70,220 50,280 0,280" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="230,220 300,220 300,280 250,280" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Trunk -->
  <rect x="130" y="270" width="40" height="30" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Ground on sides of trunk -->
  <rect x="0" y="280" width="130" height="20" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="170" y="280" width="130" height="20" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
</svg>