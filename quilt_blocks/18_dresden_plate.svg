<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Dresden Plate: 16 wedge petals on square background + center circle -->
  <!-- Background square -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- 16 wedge petals, each spanning 22.5°, from inner radius 30 to outer radius 130 -->
  <!-- Center at (150,150). Alternating dark and medium petals. -->
  <!-- Petal angles: 0, 22.5, 45, 67.5, 90, 112.5, 135, 157.5, 180, 202.5, 225, 247.5, 270, 292.5, 315, 337.5 -->

  <!-- Petal 0 (0° to 22.5°) — dark -->
  <path d="M 180,150 L 280,150 A 130,130 0 0,1 270,199.7 L 177.7,161.5 A 30,30 0 0,0 180,150 Z" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Petal 1 (22.5° to 45°) — medium -->
  <path d="M 177.7,161.5 L 270,199.7 A 130,130 0 0,1 241.9,241.9 L 171.2,171.2 A 30,30 0 0,0 177.7,161.5 Z" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Petal 2 (45° to 67.5°) — dark -->
  <path d="M 171.2,171.2 L 241.9,241.9 A 130,130 0 0,1 199.7,270 L 161.5,177.7 A 30,30 0 0,0 171.2,171.2 Z" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Petal 3 (67.5° to 90°) — medium -->
  <path d="M 161.5,177.7 L 199.7,270 A 130,130 0 0,1 150,280 L 150,180 A 30,30 0 0,0 161.5,177.7 Z" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Petal 4 (90° to 112.5°) — dark -->
  <path d="M 150,180 L 150,280 A 130,130 0 0,1 100.3,270 L 138.5,177.7 A 30,30 0 0,0 150,180 Z" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Petal 5 (112.5° to 135°) — medium -->
  <path d="M 138.5,177.7 L 100.3,270 A 130,130 0 0,1 58.1,241.9 L 128.8,171.2 A 30,30 0 0,0 138.5,177.7 Z" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Petal 6 (135° to 157.5°) — dark -->
  <path d="M 128.8,171.2 L 58.1,241.9 A 130,130 0 0,1 30,199.7 L 122.3,161.5 A 30,30 0 0,0 128.8,171.2 Z" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Petal 7 (157.5° to 180°) — medium -->
  <path d="M 122.3,161.5 L 30,199.7 A 130,130 0 0,1 20,150 L 120,150 A 30,30 0 0,0 122.3,161.5 Z" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Petal 8 (180° to 202.5°) — dark -->
  <path d="M 120,150 L 20,150 A 130,130 0 0,1 30,100.3 L 122.3,138.5 A 30,30 0 0,0 120,150 Z" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Petal 9 (202.5° to 225°) — medium -->
  <path d="M 122.3,138.5 L 30,100.3 A 130,130 0 0,1 58.1,58.1 L 128.8,128.8 A 30,30 0 0,0 122.3,138.5 Z" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Petal 10 (225° to 247.5°) — dark -->
  <path d="M 128.8,128.8 L 58.1,58.1 A 130,130 0 0,1 100.3,30 L 138.5,122.3 A 30,30 0 0,0 128.8,128.8 Z" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Petal 11 (247.5° to 270°) — medium -->
  <path d="M 138.5,122.3 L 100.3,30 A 130,130 0 0,1 150,20 L 150,120 A 30,30 0 0,0 138.5,122.3 Z" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Petal 12 (270° to 292.5°) — dark -->
  <path d="M 150,120 L 150,20 A 130,130 0 0,1 199.7,30 L 161.5,122.3 A 30,30 0 0,0 150,120 Z" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Petal 13 (292.5° to 315°) — medium -->
  <path d="M 161.5,122.3 L 199.7,30 A 130,130 0 0,1 241.9,58.1 L 171.2,128.8 A 30,30 0 0,0 161.5,122.3 Z" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Petal 14 (315° to 337.5°) — dark -->
  <path d="M 171.2,128.8 L 241.9,58.1 A 130,130 0 0,1 270,100.3 L 177.7,138.5 A 30,30 0 0,0 171.2,128.8 Z" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Petal 15 (337.5° to 360°) — medium -->
  <path d="M 177.7,138.5 L 270,100.3 A 130,130 0 0,1 280,150 L 180,150 A 30,30 0 0,0 177.7,138.5 Z" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>

  <!-- Center circle -->
  <circle cx="150" cy="150" r="30" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium-light" data-role="patch"/>
</svg>
