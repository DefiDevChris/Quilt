<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Sawtooth Star: 3x3 grid (100px cells = 4" finished each)
       Traditional: 4 corner HSTs, center square, 4 flying geese (4"x2") with side rectangles (2"x4") -->
  <!-- Corner HSTs (background/dark) -->
  <polygon points="0,0 100,0 0,100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="100,0 100,100 0,100" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="200,0 300,0 300,100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="200,0 200,100 300,100" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="0,200 100,200 100,300" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="0,200 0,300 100,300" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="200,200 300,200 300,300" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="200,200 200,300 300,300" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Center square (dark) -->
  <rect x="100" y="100" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Top flying goose (pointing up, 100x50 = 4"x2") -->
  <polygon points="100,100 200,100 150,50" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Top side rectangles (2x4" each, background) -->
  <rect x="100" y="50" width="50" height="50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <rect x="150" y="50" width="50" height="50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Right flying goose (pointing right) -->
  <polygon points="200,100 200,200 250,150" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Right side rectangles -->
  <rect x="250" y="100" width="50" height="50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <rect x="250" y="150" width="50" height="50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Bottom flying goose (pointing down) -->
  <polygon points="100,200 200,200 150,250" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Bottom side rectangles -->
  <rect x="100" y="250" width="50" height="50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <rect x="150" y="250" width="50" height="50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Left flying goose (pointing left) -->
  <polygon points="100,100 100,200 50,150" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Left side rectangles -->
  <rect x="50" y="100" width="50" height="50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <rect x="50" y="150" width="50" height="50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
</svg>
