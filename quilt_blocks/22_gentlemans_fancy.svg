<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Gentleman's Fancy: Traditional elaborated 9-patch block.
       3x3 grid (100px = 4" finished each cell).
       Corner HSTs, side rectangles with accent triangles, center square-in-square.
       Based on traditional 9-patch variations. -->
  <!-- Corner HSTs (4" finished each) -->
  <!-- Top-left: dark upper-left, light lower-right -->
  <polygon points="0,0 100,0 0,100" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="100,0 100,100 0,100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Top-right: dark upper-right, light lower-left -->
  <polygon points="200,0 300,0 300,100" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="200,0 200,100 300,100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Bottom-left: light upper-left, dark lower-right -->
  <polygon points="0,200 100,200 100,300" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="0,200 0,300 100,300" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Bottom-right: light upper-right, dark lower-left -->
  <polygon points="200,200 300,200 300,300" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="200,200 200,300 300,300" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Side rectangles: each split into 2 with accent triangle -->
  <!-- Top-center: light rect with dark accent triangle pointing down -->
  <rect x="100" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="100,0 200,0 150,50" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Middle-left: light rect with dark accent triangle pointing right -->
  <rect x="0" y="100" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="0,100 0,200 50,150" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Middle-right: light rect with dark accent triangle pointing left -->
  <rect x="200" y="100" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="300,100 300,200 250,150" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Bottom-center: light rect with dark accent triangle pointing up -->
  <rect x="100" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="100,300 200,300 150,250" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Center: square-in-square with diamond -->
  <rect x="100" y="100" width="100" height="100" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="150,100 200,150 150,200 100,150" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Center corner triangles -->
  <polygon points="100,100 150,100 100,150" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="200,100 200,150 150,100" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="200,150 200,200 150,200" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="100,150 100,200 150,200" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
</svg>
