<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Top-left HST: dark triangle top-right, light triangle bottom-left -->
  <polygon points="0,0 150,0 150,150" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="0,0 150,150 0,150" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Top-right HST: dark triangle bottom-right, light triangle top-left -->
  <polygon points="150,0 300,0 150,150" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="300,0 300,150 150,150" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Bottom-left HST: dark triangle top-left, light triangle bottom-right -->
  <polygon points="0,150 150,150 0,300" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="150,150 150,300 0,300" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Bottom-right HST: dark triangle bottom-left, light triangle top-right -->
  <polygon points="150,150 300,150 300,300" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="150,150 300,300 150,300" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
</svg>
