<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Devil's Claw: 4x4 grid (75px cells), 4 angular claw/hook shapes from corners -->
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Center diamond accent -->
  <polygon points="150,75 225,150 150,225 75,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="150,112.5 187.5,150 150,187.5 112.5,150" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Top-left claw: L-shaped hook -->
  <polygon points="0,0 150,0 150,75 75,75 75,150 0,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Top-left claw accent -->
  <polygon points="0,0 75,0 75,75 0,75" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Top-right claw: L-shaped hook (mirrored) -->
  <polygon points="300,0 300,150 225,150 225,75 150,75 150,0" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Top-right claw accent -->
  <polygon points="225,0 300,0 300,75 225,75" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right claw: L-shaped hook -->
  <polygon points="300,300 150,300 150,225 225,225 225,150 300,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right claw accent -->
  <polygon points="225,225 300,225 300,300 225,300" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left claw: L-shaped hook (mirrored) -->
  <polygon points="0,300 0,150 75,150 75,225 150,225 150,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left claw accent -->
  <polygon points="0,225 75,225 75,300 0,300" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
</svg>