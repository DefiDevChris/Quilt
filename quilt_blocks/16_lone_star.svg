<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Lone Star: 8-pointed star from diamond segments -->
  <!-- Star segments (rhombi): cardinal=dark, diagonal=medium -->
  <!-- s=81.17, tips at R=150 from center (150,150) -->

  <!-- Segment 0° (right) — dark -->
  <polygon points="150,150 225,118.9 300,150 225,181.1" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Segment 45° (lower-right) — medium -->
  <polygon points="150,150 225,181.1 256.1,256.1 181.1,225" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Segment 90° (down) — dark -->
  <polygon points="150,150 181.1,225 150,300 118.9,225" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Segment 135° (lower-left) — medium -->
  <polygon points="150,150 118.9,225 43.9,256.1 75,181.1" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Segment 180° (left) — dark -->
  <polygon points="150,150 75,181.1 0,150 75,118.9" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Segment 225° (upper-left) — medium -->
  <polygon points="150,150 75,118.9 43.9,43.9 118.9,75" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Segment 270° (up) — dark -->
  <polygon points="150,150 118.9,75 150,0 181.1,75" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <!-- Segment 315° (upper-right) — medium -->
  <polygon points="150,150 181.1,75 256.1,43.9 225,118.9" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>

  <!-- Background corner areas -->
  <!-- Top-right: from tip270° along edge to corner, down to tip0°, along star back -->
  <polygon points="150,0 300,0 300,150 225,118.9 256.1,43.9 181.1,75" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Bottom-right -->
  <polygon points="300,150 300,300 150,300 181.1,225 256.1,256.1 225,181.1" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Bottom-left -->
  <polygon points="150,300 0,300 0,150 75,181.1 43.9,256.1 118.9,225" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Top-left -->
  <polygon points="0,150 0,0 150,0 118.9,75 43.9,43.9 75,118.9" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
</svg>
