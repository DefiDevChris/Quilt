<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background - 3x3 grid (100px cells) -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Top-left cell: background -->
  <rect x="0" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Top-center cell: petal HST -->
  <polygon points="100,0 200,0 200,100 100,100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="100,0 200,100 100,100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Top-right cell: background -->
  <rect x="200" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Middle-left cell: leaf HST -->
  <polygon points="0,100 100,100 0,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="100,100 100,200 0,200" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Middle-center cell: flower center -->
  <rect x="100" y="100" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Middle-right cell: leaf HST -->
  <polygon points="200,100 300,100 300,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="200,100 200,200 300,200" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left cell: petal HST -->
  <polygon points="0,200 100,200 100,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="0,200 0,300 100,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom-center cell: stem -->
  <rect x="100" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="140" y="200" width="20" height="100" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right cell: petal HST -->
  <polygon points="200,200 300,200 200,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="300,200 300,300 200,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
</svg>