<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Kaleidoscope: 8 triangles from center alternating 2 colors, corner fills -->
  <!-- Center: 150,150 -->
  <!-- Edge midpoints: T=150,0 R=300,150 B=150,300 L=0,150 -->
  <!-- Corners: TL=0,0 TR=300,0 BR=300,300 BL=0,300 -->
  <!-- Triangle 1: center to top-midpoint to top-right corner -->
  <polygon points="150,150 150,0 300,0" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Triangle 2: center to top-right corner to right-midpoint -->
  <polygon points="150,150 300,0 300,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Triangle 3: center to right-midpoint to bottom-right corner -->
  <polygon points="150,150 300,150 300,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Triangle 4: center to bottom-right corner to bottom-midpoint -->
  <polygon points="150,150 300,300 150,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Triangle 5: center to bottom-midpoint to bottom-left corner -->
  <polygon points="150,150 150,300 0,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Triangle 6: center to bottom-left corner to left-midpoint -->
  <polygon points="150,150 0,300 0,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Triangle 7: center to left-midpoint to top-left corner -->
  <polygon points="150,150 0,150 0,0" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Triangle 8: center to top-left corner to top-midpoint -->
  <polygon points="150,150 0,0 150,0" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
</svg>