<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- North Star: 4x4 grid (75px cells), center 2x2 dark, star points radiating out -->
  <!-- Background fill -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Center 2x2 block (dark) -->
  <rect x="75" y="75" width="150" height="150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Top-left corner cell -->
  <rect x="0" y="0" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Top-right corner cell -->
  <rect x="225" y="0" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left corner cell -->
  <rect x="0" y="225" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right corner cell -->
  <rect x="225" y="225" width="75" height="75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Star points radiating outward -->
  <!-- Top star point (from center up, cells [1,0] and [2,0]) -->
  <polygon points="75,75 150,0 225,75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Left background triangles at top -->
  <polygon points="75,0 150,0 75,75" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 225,0 225,75" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Right star point -->
  <polygon points="225,75 300,150 225,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="225,75 300,75 300,150" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <polygon points="300,150 300,225 225,225" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Bottom star point -->
  <polygon points="75,225 225,225 150,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="75,225 75,300 150,300" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <polygon points="225,225 225,300 150,300" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <!-- Left star point -->
  <polygon points="75,75 75,225 0,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,75 75,75 0,150" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 75,225 0,225" fill="#E0E0E0" stroke="#333" stroke-width="1"/>
</svg>
