<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Variable Star: 3x3 grid, center dark, corners background, sides have star points -->
  <!-- Corner squares (background) -->
  <rect x="0" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="200" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="0" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="200" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Center square (dark) -->
  <rect x="100" y="100" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Top side: star point (two triangles forming a point upward) -->
  <polygon points="100,100 150,0 200,100" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="100,0 150,0 100,100" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 200,0 200,100" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Right side: star point (pointing right) -->
  <polygon points="200,100 300,150 200,200" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="200,100 300,100 300,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,150 300,200 200,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom side: star point (pointing down) -->
  <polygon points="100,200 200,200 150,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="100,200 100,300 150,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="200,200 200,300 150,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Left side: star point (pointing left) -->
  <polygon points="100,100 100,200 0,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="0,100 100,100 0,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 100,200 0,200" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
</svg>
