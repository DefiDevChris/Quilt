<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Prickly Pear: Traditional cactus-inspired block, 6x6 grid (50px = 2" finished each).
       Center diamond made from 4 quarter-square triangles.
       Surrounding sawtooth triangles form the pear/cactus shape.
       Corner squares anchor the design. Border triangles create the prickly edge. -->
  <!-- Center diamond: 4" finished, made from 4 QST triangles -->
  <polygon points="150,100 200,150 150,200 100,150" fill="#505050" stroke="#333" stroke-width="1" data-shade="dark" data-role="patch"/>
  <polygon points="150,100 150,150 100,150" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="150,100 200,150 150,150" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="150,200 200,150 150,150" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="150,200 100,150 150,150" fill="#E0E0E0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Inner ring: sawtooth triangles pointing outward from diamond -->
  <polygon points="150,100 200,100 175,50" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="200,150 200,100 250,125" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="200,150 200,200 250,175" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="150,200 200,200 175,250" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="150,200 100,200 125,250" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="100,150 100,200 50,175" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="100,150 100,100 50,125" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <polygon points="150,100 100,100 125,50" fill="#B0B0B0" stroke="#333" stroke-width="1" data-shade="medium" data-role="patch"/>
  <!-- Corner squares: 4" finished each -->
  <rect x="0" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <rect x="200" y="0" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <rect x="0" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <rect x="200" y="200" width="100" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <!-- Edge triangles between corners and inner ring -->
  <polygon points="100,0 200,0 150,50" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="300,100 300,200 250,150" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="100,300 200,300 150,250" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <polygon points="0,100 0,200 50,150" fill="#D0D0D0" stroke="#333" stroke-width="1" data-shade="light" data-role="patch"/>
  <!-- Filler triangles at edges -->
  <polygon points="100,0 150,50 100,100" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="200,0 200,100 250,50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="300,100 250,150 300,200" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="200,200 250,250 200,300" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="100,300 150,250 100,200" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="0,200 50,250 0,300" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="0,100 50,150 0,200" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
  <polygon points="100,0 100,100 50,50" fill="#F8F8F8" stroke="#333" stroke-width="1" data-shade="background" data-role="patch"/>
</svg>
