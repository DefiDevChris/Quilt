<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Goose Tracks: 4x4 grid (75px cells) -->
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Center diamond (rotated square) -->
  <polygon points="150,75 225,150 150,225 75,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Flying geese tracks in each quadrant pointing toward corners -->
  <!-- Top-left quadrant: geese pointing to top-left corner -->
  <polygon points="0,0 75,0 0,75" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="75,0 75,75 0,75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,0 37.5,0 0,37.5" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Top-right quadrant: geese pointing to top-right corner -->
  <polygon points="225,0 300,0 300,75" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="225,0 225,75 300,75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="262.5,0 300,0 300,37.5" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left quadrant: geese pointing to bottom-left corner -->
  <polygon points="0,225 75,225 75,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,225 0,300 75,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="0,262.5 37.5,300 0,300" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right quadrant: geese pointing to bottom-right corner -->
  <polygon points="225,225 300,225 225,300" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,225 300,300 225,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="300,262.5 300,300 262.5,300" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Side geese - flying geese along edges pointing outward -->
  <!-- Top edge geese (between corners) -->
  <polygon points="75,0 150,0 112.5,75" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 225,0 187.5,75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom edge geese -->
  <polygon points="75,300 150,300 112.5,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="150,300 225,300 187.5,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Left edge geese -->
  <polygon points="0,75 0,150 75,112.5" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="0,150 0,225 75,187.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Right edge geese -->
  <polygon points="300,75 300,150 225,112.5" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="300,150 300,225 225,187.5" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
</svg>