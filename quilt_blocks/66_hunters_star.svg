<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Hunter's Star: interlocking star from two overlapping rotated squares -->
  <!-- Background -->
  <rect x="0" y="0" width="300" height="300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- The pattern divides into 4 quadrants, each with triangular pieces -->
  <!-- Top-left quadrant -->
  <!-- Background corner triangle -->
  <polygon points="0,0 75,0 0,75" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Dark triangle (square 1 piece) -->
  <polygon points="75,0 150,0 150,75" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Light triangle (square 2 piece) -->
  <polygon points="0,75 0,150 75,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Overlap/intersection area -->
  <polygon points="75,0 0,75 75,150 150,75" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Top-right quadrant -->
  <polygon points="300,0 300,75 225,0" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="150,0 225,0 150,75" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="300,75 300,150 225,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="225,0 300,75 225,150 150,75" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right quadrant -->
  <polygon points="300,300 225,300 300,225" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="225,300 150,300 150,225" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="300,225 300,150 225,150" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="225,300 300,225 225,150 150,225" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left quadrant -->
  <polygon points="0,300 0,225 75,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="150,300 75,300 150,225" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <polygon points="0,225 0,150 75,150" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="75,300 0,225 75,150 150,225" fill="#B0B0B0" stroke="#333" stroke-width="1"/>
</svg>