<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Weather Vane: 3x3 grid, center dark, corners HSTs, sides rectangles split -->
  <!-- Center square (dark) -->
  <rect x="100" y="100" width="100" height="100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Corner HSTs: dark triangle pointing toward center -->
  <!-- Top-left corner: dark lower-right -->
  <polygon points="0,0 100,0 0,100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="100,0 100,100 0,100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Top-right corner: dark lower-left -->
  <polygon points="200,0 300,0 300,100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <polygon points="200,0 300,100 200,100" fill="#505050" stroke="#333" stroke-width="1"/>
  <!-- Bottom-left corner: dark upper-right -->
  <polygon points="0,200 100,200 100,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="0,200 100,300 0,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Bottom-right corner: dark upper-left -->
  <polygon points="200,200 300,200 200,300" fill="#505050" stroke="#333" stroke-width="1"/>
  <polygon points="300,200 300,300 200,300" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Side rectangles split for directional vane effect -->
  <!-- Top side: split horizontally -->
  <rect x="100" y="0" width="100" height="50" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <rect x="100" y="50" width="100" height="50" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <!-- Right side: split vertically -->
  <rect x="200" y="100" width="50" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="250" y="100" width="50" height="100" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Bottom side: split horizontally -->
  <rect x="100" y="200" width="100" height="50" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
  <rect x="100" y="250" width="100" height="50" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <!-- Left side: split vertically -->
  <rect x="0" y="100" width="50" height="100" fill="#D0D0D0" stroke="#333" stroke-width="1"/>
  <rect x="50" y="100" width="50" height="100" fill="#F8F8F8" stroke="#333" stroke-width="1"/>
</svg>
