name: Wire shop imagery (one-time)

on:
  workflow_dispatch:
  push:
    branches: [bright-shop-imagery]
    paths: ['.github/workflows/wire-shop-imagery.yml']

permissions:
  contents: write

jobs:
  wire-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: bright-shop-imagery

      - name: Download shop images from public CDN
        run: |
          mkdir -p public/images/shop
          set -eux
          curl -sL -o public/images/shop/fabric-by-yard.jpg "https://pub.hyperagent.com/api/published/IwTf7W6f3nH-HnoLWY0K8w/fabric-by-yard.jpg"
          curl -sL -o public/images/shop/featured-store.jpg "https://pub.hyperagent.com/api/published/Vd9j4_H_htNdazweJ1s2ww/featured-store.jpg"
          curl -sL -o public/images/shop/fabric-shop-shelves.jpg "https://pub.hyperagent.com/api/published/4ctab3au8R-GenX2xlAqgA/fabric-shop-shelves.jpg"
          curl -sL -o public/images/shop/fabric-collection.jpg "https://pub.hyperagent.com/api/published/RIgyKDTRUAqrOJCsbEvCXQ/fabric-collection.jpg"
          curl -sL -o public/images/shop/charm-packs.jpg "https://pub.hyperagent.com/api/published/5uCPwF1nle7mu3OzRwp-iQ/charm-packs.jpg"
          curl -sL -o public/images/shop/quilting-thread.jpg "https://pub.hyperagent.com/api/published/lntU9-SFmaiI7--JzrRPBA/quilting-thread.jpg"
          curl -sL -o public/images/shop/jelly-rolls.jpg "https://pub.hyperagent.com/api/published/6F4E3Ld0fp8ctnKDfIGFUA/jelly-rolls.jpg"
          curl -sL -o public/images/shop/sewing-machine.jpg "https://pub.hyperagent.com/api/published/fKAF1JNuwG_afJgFppR3ww/sewing-machine.jpg"

      - name: Verify files are valid JPEGs
        run: |
          set -eux
          for f in fabric-by-yard featured-store fabric-shop-shelves fabric-collection charm-packs quilting-thread jelly-rolls sewing-machine; do
            path="public/images/shop/${f}.jpg"
            size=$(stat -c %s "$path")
            if [ "$size" -lt 10000 ]; then
              echo "ERROR: $path too small ($size bytes)"; exit 1
            fi
            magic=$(head -c 3 "$path" | od -An -tx1 | tr -d ' \n')
            if [ "$magic" != "ffd8ff" ]; then
              echo "ERROR: $path magic=$magic, not a JPEG"; exit 1
            fi
          done
          ls -la public/images/shop/

      - name: Swap shop-imagery.ts to local paths
        run: |
          cat > src/lib/shop-imagery.ts <<'EOF'
          /**
           * Centralized shop imagery paths.
           *
           * Images live at `public/images/shop/<name>.jpg`.
           *
           * Aesthetic: bright, saturated, modern editorial (Connecting Threads style).
           */
          export const SHOP_IMAGERY = {
            // Fat quarters flat-lay on white marble — hero / fabric-by-yard
            fabricByYard: '/images/shop/fabric-by-yard.jpg',

            // Two quilters laughing at a bright workshop table — community / featured store
            featuredStore: '/images/shop/featured-store.jpg',

            // Modern quilt block on white background — fresh arrivals
            fabricShopShelves: '/images/shop/fabric-shop-shelves.jpg',

            // Modern geometric quilt on white chair — essential solids / collection
            fabricCollection: '/images/shop/fabric-collection.jpg',

            // White tray of bright fat quarters with styling props — precuts / charm packs
            charmPacks: '/images/shop/charm-packs.jpg',

            // Dense rainbow thread spools — thread & bobbins
            quiltingThread: '/images/shop/quilting-thread.jpg',

            // Vivid quilt squares on cutting mat — notions / jelly rolls
            jellyRolls: '/images/shop/jelly-rolls.jpg',

            // Modern white sewing machine on marble — optional / design studio
            sewingMachine: '/images/shop/sewing-machine.jpg',
          } as const;

          export type ShopImageKey = keyof typeof SHOP_IMAGERY;
          EOF

      - name: Rewrite next.config.ts to remove pub.hyperagent.com
        run: |
          cat > next.config.ts <<'EOF'
          import type { NextConfig } from 'next';

          const cloudfrontHostname = process.env.NEXT_PUBLIC_CLOUDFRONT_URL
            ? new URL(process.env.NEXT_PUBLIC_CLOUDFRONT_URL).hostname
            : undefined;

          const cloudfrontCspSource = cloudfrontHostname ? ` https://${cloudfrontHostname}` : '';

          /**
           * Content Security Policy (CSP) Configuration
           *
           * SECURITY NOTE: 'unsafe-inline' is currently required for script-src due to Next.js App Router
           * limitations. Next.js 16.x does not yet support nonce-based CSP for App Router runtime chunks.
           *
           * This is a known framework limitation, not a code defect. The risk is mitigated by:
           * - Strict same-origin policy
           * - No user-generated script content
           * - SVG sanitization (DOMPurify)
           * - Input validation on all API routes
           *
           * Monitor: https://github.com/vercel/next.js/discussions/54907
           * Action: Migrate to nonce-based CSP when Next.js adds support
           */
          const csp = [
            "default-src 'self'",
            `script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'${process.env.NEXT_PUBLIC_DEV_CSP === 'true' ? " 'unsafe-eval'" : ''} https://js.stripe.com`,
            "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com",
            "font-src 'self' https://fonts.gstatic.com",
            `img-src 'self' data: blob: https://*.googleusercontent.com https://i.pravatar.cc${cloudfrontCspSource}`,
            "worker-src 'self' blob:",
            'frame-src https://js.stripe.com https://hooks.stripe.com',
            "connect-src 'self' https://api.stripe.com https://accounts.google.com https://*.s3.amazonaws.com https://*.s3.us-east-1.amazonaws.com https://*.s3.us-east-2.amazonaws.com https://*.s3.us-west-1.amazonaws.com https://*.s3.us-west-2.amazonaws.com",
            "object-src 'none'",
            "frame-ancestors 'none'",
            "form-action 'self'",
            'upgrade-insecure-requests',
          ].join('; ');

          const securityHeaders = [
            { key: 'Content-Security-Policy', value: csp },
            { key: 'X-Frame-Options', value: 'DENY' },
            { key: 'X-Content-Type-Options', value: 'nosniff' },
            { key: 'Referrer-Policy', value: 'strict-origin-when-cross-origin' },
            { key: 'Permissions-Policy', value: 'camera=(self), microphone=(), geolocation=()' },
            { key: 'Strict-Transport-Security', value: 'max-age=31536000; includeSubDomains; preload' },
          ];

          const nextConfig: NextConfig = {
            async headers() {
              return [
                {
                  source: '/(.*)',
                  headers: securityHeaders,
                },
              ];
            },
            output: 'standalone',
            images: {
              remotePatterns: [
                { protocol: 'https', hostname: '*.googleusercontent.com' },
                ...(cloudfrontHostname ? [{ protocol: 'https' as const, hostname: cloudfrontHostname }] : []),
              ],
            },
          };

          export default nextConfig;
          EOF

      - name: Remove this workflow file (one-shot)
        run: rm .github/workflows/wire-shop-imagery.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A public/images/shop/ src/lib/shop-imagery.ts next.config.ts .github/workflows/wire-shop-imagery.yml
          git diff --cached --stat
          git commit -m "feat(shop): self-host bright shop imagery, drop CDN dependency

          - Download 8 shop images into public/images/shop/
          - Swap SHOP_IMAGERY to local /images/shop/<name>.jpg paths
          - Remove pub.hyperagent.com from next.config.ts CSP and remotePatterns
          - Remove one-shot wire-shop-imagery.yml workflow"
          git push
